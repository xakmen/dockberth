# git-cliff configuration — CHANGELOG.md is generated from conventional
# commits at release time: `npm run changelog` (or npx git-cliff).
[changelog]
header = """
# Changelog

All notable changes to Dockberth. Generated from conventional commits
with [git-cliff](https://git-cliff.org).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | split(pat="\n") | first | trim }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_preprocessors = [
  # Some commits lack the blank line between summary and body, which the
  # conventional parser rejects ("Incorrect body syntax") — reinsert it.
  { pattern = '\A([^\n]+)\n([^\n])', replace = "${1}\n\n${2}" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^doc", group = "<!-- 3 -->Documentation" },
  { message = "^refactor|^style", group = "<!-- 4 -->Refactoring" },
  { message = "^test|^ci|^build|^chore", skip = true },
]
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
