<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dockberth</title>
    <style>
      /* Pre-bundle boot styles: theme tokens are not loaded yet, so the
       * colors mirror globals.css (--background / --primary). Keep in sync. */
      html {
        background: #0a0e13;
      }
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e13;
        transition: opacity 0.25s ease;
      }
      #preloader.preloader-done {
        opacity: 0;
        pointer-events: none;
      }
      #preloader svg {
        width: 48px;
        height: 48px;
        color: #3fc1d4;
        animation: preloader-pulse 1.2s ease-in-out infinite;
      }
      @keyframes preloader-pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- Shown until React mounts; App removes it (berth glyph, design/icon). -->
    <div id="preloader" aria-hidden="true">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M13 12v13a11 11 0 0 0 22 0V12"
          fill="none"
          stroke="currentColor"
          stroke-width="4.5"
          stroke-linecap="round"
        />
        <rect x="18.5" y="19" width="11" height="11" rx="2.5" fill="currentColor" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
