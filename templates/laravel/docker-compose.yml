# Dockberth — Laravel environment.
# Source template: templates/laravel/ in the Dockberth repo, rendered by
# src-tauri/src/template.rs. The generated copy in .dockberth/ is recreated
# from .dockberth/config.json — change settings there, not here.
#
# The app container is serversideup/php (nginx + php-fpm in one container,
# Laravel-optimized, serves HTTP on 8080 — see docs/ARCHITECTURE.md).

name: dockberth-{project}

services:
  app:
    image: serversideup/php:{php_version}-fpm-nginx
    restart: unless-stopped
#[section:ntfs_root]
    # NTFS bind mounts appear root-owned inside the container and cannot be
    # chown-ed, so on Windows drives the app runs as root (local dev only).
    # The mounted run script adds --allow-to-run-as-root to php-fpm.
    user: root
    environment:
      PHP_FPM_CHILD_PROCESS_USER: root
      PHP_FPM_CHILD_PROCESS_GROUP: root
#[/section]
    volumes:
      # The compose file lives in <project>/.dockberth/, so the project root is one level up.
      - ..:/var/www/html
#[section:ntfs_root]
      - ./php-fpm-root-run:/etc/s6-overlay/s6-rc.d/php-fpm/run:ro
#[/section]
    networks:
      - default
      - dockberth
    labels:
      traefik.enable: "true"
      traefik.http.routers.{project}.rule: Host(`{project}.test`)
      traefik.http.services.{project}.loadbalancer.server.port: "8080"
    depends_on:
      - db

  db:
    image: {db_image}
    restart: unless-stopped
#[section:db_mysql]
    environment:
      MYSQL_DATABASE: {db_name}
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
#[/section]
#[section:db_postgres]
    environment:
      POSTGRES_DB: {db_name}
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: laravel
    volumes:
      - db-data:/var/lib/postgresql/data
#[/section]
    networks:
      - default

#[section:redis]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default
#[/section]

volumes:
  db-data:
    name: dockberth-{project}-db

networks:
  default:
  dockberth:
    external: true
