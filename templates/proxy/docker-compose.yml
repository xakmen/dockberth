# Dockberth global proxy — Traefik v3.
# One instance per machine. Owns host port 80 (bound to loopback) and
# routes <name>.<suffix> domains (suffix from app settings, default
# "test") to project containers discovered via Docker labels on the
# external "dockberth" network. Deployed by the app into its data
# directory and started with `docker compose up -d` (see
# src-tauri/src/proxy.rs).

name: dockberth-proxy

services:
  traefik:
    # v3.6+ required: its Docker client speaks the API version that the
    # Docker 29 daemon still accepts (v3.5 gets 400 Bad Request).
    image: traefik:v3.6
    container_name: dockberth-proxy
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=dockberth
      - --entrypoints.web.address=:80
    ports:
      # Bound to loopback: `.test` domains resolve to 127.0.0.1 via the
      # hosts file, so nothing is lost, and dev sites are not exposed to
      # the LAN. 443 is intentionally not published until TLS ships.
      - "127.0.0.1:80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dockberth

networks:
  dockberth:
    external: true
