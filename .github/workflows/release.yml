# Release — on tag v*: build the NSIS installer, sign updater artifacts,
# generate latest.json and open a DRAFT GitHub release (notes are reviewed
# and published manually).
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs the full history and tags for release notes.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Draft body = this version's CHANGELOG section (same git-cliff config).
      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          # Random delimiter so a commit message line can't close the
          # heredoc early and inject step outputs into $GITHUB_OUTPUT.
          delim="NOTES_EOF_$(openssl rand -hex 16)"
          {
            echo "body<<${delim}"
            npx git-cliff --latest --strip header
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dockberth ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          includeUpdaterJson: true
